name: Go Continuous Improvement

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  license-check:
    name: License Compliance
    permissions:
      contents: read # for checking out code
    uses: open-crypto-broker/.github/.github/workflows/license-compliance.yaml@main # nolint # zizmor: ignore[unpinned-uses]
    with:
      directory_to_scan: '.'

  go-pipeline:
    name: Go CI Pipeline
    permissions:
      contents: read # for checking out code and submodules
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'

      - name: Install Task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: '3.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run benchmarks
        continue-on-error: true
        run: |
          git config --global --add safe.directory /__w/crypto-broker-cli-go/crypto-broker-cli-go
          git clone -b main --single-branch https://github.com/open-crypto-broker/crypto-broker-server.git
          git submodule update --init
          cd crypto-broker-server
          mkdir profiles
          cp example-profiles/Profiles.yaml ./profiles/
          go build -o bin/cryptobroker-server-non-fips cmd/server/server.go
          go version -m ./bin/cryptobroker-server-non-fips
          CRYPTO_BROKER_LOG_LEVEL=error CRYPTO_BROKER_PROFILES_DIR=$(pwd)/profiles OTEL_TRACES_SAMPLER=always_off ./bin/cryptobroker-server-non-fips &
          SERVER_PID=$!
          cd ..
          task run-benchmarks
          go test -run=^$ -bench='Benchmark' -benchmem -json ./... > benchmark-results.json
          kill $SERVER_PID

      - name: Run benchmarks with FIPS mode enabled
        continue-on-error: true
        run: |
          cd crypto-broker-server
          GOFIPS140=v1.0.0 go build -o bin/cryptobroker-server-fips cmd/server/server.go
          go version -m ./bin/cryptobroker-server-fips
          CRYPTO_BROKER_LOG_LEVEL=error CRYPTO_BROKER_PROFILES_DIR=$(pwd)/profiles OTEL_TRACES_SAMPLER=always_off ./bin/cryptobroker-server-fips &
          SERVER_PID=$!
          cd ..
          task run-benchmarks
          kill $SERVER_PID

      - name: Assert benchmark performance
        continue-on-error: false
        run: |
          chmod +x benchmark-assert.sh
          ./benchmark-assert.sh benchmark-results.json

      - name: Run CI task from Taskfile
        run: task ci
