version: '3'

dotenv: ['.env']

vars:
  # GNU grep support depending on OS
  GREP_CMD:
    sh: |
      case "$(uname)" in
        Darwin*) echo ggrep ;;
        Linux*) echo grep ;;
      esac

tasks:
  ################# Development Tools ####################
  copy-env:
    desc: "Copies example environment variables to .env file"
    cmds:
      - cp .env.example .env

  bash-add-go-path:
    desc: "Add Go binary folder to .bashrc if it does not already exists"
    internal: true
    platforms: ["linux/amd64"]
    cmds:
      - grep -qx 'export PATH="$PATH:$(go env GOPATH)/bin"' ~/.bashrc || echo 'export PATH="$PATH:$(go env GOPATH)/bin"' >> ~/.bashrc
      - source ~/.bashrc

  # Public task to install Go vulnerability checking tool
  install-go-vulnerability-check:
    desc: "Install Go vulnerability checking tool"
    cmds:
      - task: install-go-vulnerability-check-linux-amd64
      - task: install-go-vulnerability-check-darwin

  install-go-vulnerability-check-linux-amd64:
    desc: "Install Go vulnerability checking tool for Linux"
    internal: true
    deps: [bash-add-go-path]
    platforms: ["linux/amd64"]
    cmds:
      - go install golang.org/x/vuln/cmd/govulncheck@latest

  install-go-vulnerability-check-darwin:
    desc: "Install Go vulnerability checking tool for Apple/macOS"
    internal: true
    platforms: ["darwin"]
    cmds:
      - brew install govulncheck

  install-golangci-lint:
    desc: "Install golangci-lint"
    cmds:
      - curl -sSfL https://golangci-lint.run/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.11.4

  ################# Build Go CLI ####################
  build:
    desc: "Build CLI"
    deps: [format, lint]
    vars:
      APP_NAME: '{{.APP_NAME | default "go-client-cli"}}'
    cmds:
      - go build -o ./bin/{{.APP_NAME}} main.go
    sources:
      - main.go
      - internal/**/*.go
      - ./*.go
      - go.mod
      - go.sum
      - .env
    generates:
      - bin/{{.APP_NAME}}

  build-docker:
    desc: "Build Docker image for the Go client app"
    vars:
      TAG: '{{.TAG | default "dev"}}'
    cmds:
      - |
        docker buildx build \
          -f docker/Dockerfile \
          -t ghcr.io/open-crypto-broker/test_app_go:{{.TAG}} .

  delete-binary:
    desc: "Delete binary artifact"
    vars:
      APP_NAME: '{{.APP_NAME | default "go-client-cli"}}'
    cmds:
      - rm bin/{{.APP_NAME}}

  ################# Tests ####################
  test-benchmark:
    deps: [build]
    desc: "Test benchmark command to request a server-side benchmark"
    vars:
      APP_NAME: '{{.APP_NAME | default "go-client-cli"}}'
    cmds:
      - ./bin/{{.APP_NAME}} benchmark

  test-hash:
    deps: [build]
    desc: "Test hashing command with Default profile"
    vars:
      APP_NAME: '{{.APP_NAME | default "go-client-cli"}}'
    cmds:
      - ./bin/{{.APP_NAME}} hash "Hello" --profile=Default

  test-health:
    deps: [build]
    desc: "Requests the server status using the CLI's health command"
    vars:
      APP_NAME: '{{.APP_NAME | default "go-client-cli"}}'
    cmds:
      - ./bin/{{.APP_NAME}} health

  test-sign:
    deps: [build]
    desc: "Test certificate signing command with Default profile"
    vars:
      APP_NAME: '{{.APP_NAME | default "go-client-cli"}}'
    cmds:
      - |
        rm -rf $TEST_OUTPUT_DIR
        mkdir -p $TEST_OUTPUT_DIR
        RESPONSE=$(./bin/{{.APP_NAME}} --profile=Default sign \
                    --csr=$TEST_CSR_DIR/csr-nist-secp256r1.csr \
                    --caCert=$TEST_CA_DIR/cert-test-CA-nist-secp384r1.pem \
                    --caKey=$TEST_CA_DIR/test-CA-nist-secp384r1.pem)
        if echo "$RESPONSE" | {{.GREP_CMD}} -E 'Sign [Rr]esponse'; then
          SIGNED_CERTIFICATE=$(echo "$RESPONSE" | {{.GREP_CMD}} -oP '\"signedCertificate\":\s?"\K[^"]+')
          printf "$SIGNED_CERTIFICATE" > $TEST_OUTPUT_DIR/cert-response.pem
          openssl x509 -inform PEM -in $TEST_OUTPUT_DIR/cert-response.pem -text
        else
          echo -e "Certificate signing failed"
        fi

  # More about benchmarks:
  # - https://pkg.go.dev/testing@go1.25.3#hdr-Benchmarks
  # - https://go.googlesource.com/proposal/+/master/design/14313-benchmark-format.md
  # - go help testflag
  run-benchmarks:
    desc: "Command runs benchmarks"
    env:
      OTEL_TRACES_SAMPLER: 'always_off'
    cmds:
      - go test ./... -benchmem -run=^$ -bench ^Benchmark

  ################# Continuous Improvement Tasks ####################
  check-dependencies:
    desc: "Set the dependencies"
    cmds:
      - go mod tidy && go mod verify

  format:
    desc: "Apply formatting rules to Go code"
    cmds:
      - go fmt ./...

  lint:
    desc: "Apply linting to Go code"
    cmds:
      - go vet ./...

  unit-test:
    desc: "Run unit-tests"
    cmds:
      - go test ./... -cover

  vulnerability-check:
    desc: "Run vulnerability check"
    deps: [install-go-vulnerability-check]
    cmds:
      - govulncheck ./...

  golangci-lint:
    desc: "Run golangci-lint"
    deps: [install-golangci-lint]
    cmds:
      - golangci-lint run ./...

  ci:
    desc: "Runs continuous integration checks on source code"
    cmds:
      - task: check-dependencies
      - task: format
      - task: lint
      - task: golangci-lint
      - task: unit-test
      - task: vulnerability-check
